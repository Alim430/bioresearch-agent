<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 820" role="img" style="background:#ffffff;font-family:-apple-system,'SF Pro Display','Segoe UI',Roboto,sans-serif">
  <title>BioResearch Agent Framework — System Overview</title>
  <desc>End-to-end AI system for biomedical research: 3 cognitive agents, 6 engines, 3 workflows, deterministic outputs.</desc>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#94A3B8" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="ard" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#DB2777" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <linearGradient id="hd" x1="0" y1="0" x2="680" y2="0"><stop offset="0" stop-color="#0F172A"/><stop offset="1" stop-color="#1E293B"/></linearGradient>
  </defs>

  <!-- ════════ HEADER ════════ -->
  <rect x="0" y="0" width="680" height="72" fill="url(#hd)"/>
  <text x="340" y="30" text-anchor="middle" fill="#F8FAFC" font-size="18" font-weight="600" letter-spacing="0.4">BioResearch Agent Framework</text>
  <text x="340" y="52" text-anchor="middle" fill="#94A3B8" font-size="12">An open framework for AI-driven biomedical research</text>

  <!-- ════════ INPUT ════════ -->
  <g transform="translate(250,92)">
    <rect x="0" y="0" width="180" height="46" rx="23" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
    <text x="90" y="19" text-anchor="middle" fill="#1D4ED8" font-size="11.5" font-weight="500">Research Question</text>
    <text x="90" y="34" text-anchor="middle" fill="#64748B" font-size="9.5">Natural language input</text>
  </g>
  <line x1="340" y1="140" x2="340" y2="162" stroke="#94A3B8" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- ════════ AGENTS ════════ -->
  <text x="44" y="180" fill="#0F172A" font-size="10.5" font-weight="600" letter-spacing="1.2">COGNITIVE AGENTS</text>

  <g transform="translate(44,190)">
    <rect x="0" y="0" width="188" height="86" rx="12" fill="#FFFBEB" stroke="#F59E0B" stroke-width="0.75"/>
    <circle cx="24" cy="24" r="15" fill="#FBBF24"/>
    <text x="24" y="28" text-anchor="middle" fill="#78350F" font-size="13" font-weight="600">H</text>
    <text x="48" y="20" fill="#92400E" font-size="12" font-weight="600">Hypothesis Agent</text>
    <text x="48" y="37" fill="#B45309" font-size="9.5">Formulate testable</text>
    <text x="48" y="51" fill="#B45309" font-size="9.5">hypotheses &amp; claims</text>
    <line x1="16" y1="62" x2="172" y2="62" stroke="#FDE68A" stroke-width="0.5"/>
    <text x="94" y="76" text-anchor="middle" fill="#A16207" font-size="8.5">Decompose · Predict</text>
  </g>

  <g transform="translate(246,190)">
    <rect x="0" y="0" width="188" height="86" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="0.75"/>
    <circle cx="24" cy="24" r="15" fill="#60A5FA"/>
    <text x="24" y="28" text-anchor="middle" fill="#1E3A8A" font-size="13" font-weight="600">E</text>
    <text x="48" y="20" fill="#1E40AF" font-size="12" font-weight="600">Evidence Agent</text>
    <text x="48" y="37" fill="#2563EB" font-size="9.5">Retrieve &amp; integrate</text>
    <text x="48" y="51" fill="#2563EB" font-size="9.5">multi-source data</text>
    <line x1="16" y1="62" x2="172" y2="62" stroke="#BFDBFE" stroke-width="0.5"/>
    <text x="94" y="76" text-anchor="middle" fill="#1D4ED8" font-size="8.5">Search · Extract</text>
  </g>

  <g transform="translate(448,190)">
    <rect x="0" y="0" width="188" height="86" rx="12" fill="#FDF2F8" stroke="#EC4899" stroke-width="0.75"/>
    <circle cx="24" cy="24" r="15" fill="#F472B6"/>
    <text x="24" y="28" text-anchor="middle" fill="#831843" font-size="13" font-weight="600">C</text>
    <text x="48" y="20" fill="#9D174D" font-size="12" font-weight="600">Critique Agent</text>
    <text x="48" y="37" fill="#BE185D" font-size="9.5">Evaluate &amp; refine</text>
    <text x="48" y="51" fill="#BE185D" font-size="9.5">challenge hypotheses</text>
    <line x1="16" y1="62" x2="172" y2="62" stroke="#FBCFE8" stroke-width="0.5"/>
    <text x="94" y="76" text-anchor="middle" fill="#9D174D" font-size="8.5">Detect · Score</text>
  </g>

  <!-- ═══ AGENT INTERACTION: forward pass + refinement loop ═══ -->
  <!-- forward micro-arrows (Hypothesis -> Evidence -> Critique) -->
  <path d="M233,214 L246,214" fill="none" stroke="#CBD5E1" stroke-width="1.1" stroke-linecap="round" marker-end="url(#ar)"/>
  <path d="M435,214 L448,214" fill="none" stroke="#CBD5E1" stroke-width="1.1" stroke-linecap="round" marker-end="url(#ar)"/>
  <!-- refinement return loop (Critique -> Hypothesis) -->
  <path d="M436,280 C436,304 244,304 142,280" fill="none" stroke="#DB2777" stroke-width="1.2" stroke-dasharray="6,3" stroke-linecap="round" marker-end="url(#ard)" opacity="0.8"/>
  <text x="340" y="296" text-anchor="middle" fill="#BE185D" font-size="9.5" font-weight="600" font-style="italic" paint-order="stroke" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round">iterative refinement loop</text>

  <line x1="340" y1="312" x2="340" y2="332" stroke="#94A3B8" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- ════════ ENGINES ════════ -->
  <text x="44" y="350" fill="#0F172A" font-size="10.5" font-weight="600" letter-spacing="1.2">CORE ENGINES</text>

  <g transform="translate(44,360)"><rect x="0" y="0" width="92" height="58" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/><text x="46" y="24" text-anchor="middle" fill="#334155" font-size="10.5" font-weight="500">Reasoning</text><text x="46" y="40" text-anchor="middle" fill="#64748B" font-size="8.5">Plan · Logic</text><text x="46" y="51" text-anchor="middle" fill="#94A3B8" font-size="8">Multi-step</text></g>
  <g transform="translate(144,360)"><rect x="0" y="0" width="92" height="58" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/><text x="46" y="24" text-anchor="middle" fill="#334155" font-size="10.5" font-weight="500">Retrieval</text><text x="46" y="40" text-anchor="middle" fill="#64748B" font-size="8.5">Search · KG</text><text x="46" y="51" text-anchor="middle" fill="#94A3B8" font-size="8">Knowledge</text></g>
  <g transform="translate(244,360)"><rect x="0" y="0" width="92" height="58" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/><text x="46" y="24" text-anchor="middle" fill="#334155" font-size="10.5" font-weight="500">Analysis</text><text x="46" y="40" text-anchor="middle" fill="#64748B" font-size="8.5">Stats · Bio</text><text x="46" y="51" text-anchor="middle" fill="#94A3B8" font-size="8">Bioinformatics</text></g>
  <g transform="translate(344,360)"><rect x="0" y="0" width="92" height="58" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/><text x="46" y="24" text-anchor="middle" fill="#334155" font-size="10.5" font-weight="500">Evidence</text><text x="46" y="40" text-anchor="middle" fill="#64748B" font-size="8.5">Score · Grade</text><text x="46" y="51" text-anchor="middle" fill="#94A3B8" font-size="8">Confidence</text></g>
  <g transform="translate(444,360)"><rect x="0" y="0" width="92" height="58" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/><text x="46" y="24" text-anchor="middle" fill="#334155" font-size="10.5" font-weight="500">Writing</text><text x="46" y="40" text-anchor="middle" fill="#64748B" font-size="8.5">Draft · Cite</text><text x="46" y="51" text-anchor="middle" fill="#94A3B8" font-size="8">Generation</text></g>
  <g transform="translate(544,360)"><rect x="0" y="0" width="92" height="58" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/><text x="46" y="24" text-anchor="middle" fill="#334155" font-size="10.5" font-weight="500">Tool</text><text x="46" y="40" text-anchor="middle" fill="#64748B" font-size="8.5">Run · I/O</text><text x="46" y="51" text-anchor="middle" fill="#94A3B8" font-size="8">Orchestrate</text></g>

  <!-- validation badge -->
  <g transform="translate(140,430)">
    <rect x="0" y="0" width="400" height="28" rx="14" fill="#ECFDF5" stroke="#10B981" stroke-width="0.5"/>
    <text x="200" y="18" text-anchor="middle" fill="#047857" font-size="9" font-weight="500">&#10003; Validation &amp; Scoring — statistical checks · consistency · confidence</text>
  </g>

  <line x1="340" y1="468" x2="340" y2="490" stroke="#94A3B8" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- ════════ WORKFLOWS ════════ -->
  <text x="44" y="508" fill="#0F172A" font-size="10.5" font-weight="600" letter-spacing="1.2">RESEARCH WORKFLOWS</text>

  <g transform="translate(44,518)">
    <rect x="0" y="0" width="188" height="78" rx="12" fill="#FAFAF9" stroke="#E7E5E4" stroke-width="0.5"/>
    <rect x="0" y="0" width="5" height="78" rx="2.5" fill="#3B82F6"/>
    <text x="18" y="22" fill="#0F172A" font-size="11.5" font-weight="600">Literature Review</text>
    <text x="18" y="40" fill="#475569" font-size="9">Search &amp; screen</text>
    <text x="18" y="54" fill="#475569" font-size="9">Build knowledge graph</text>
    <text x="18" y="69" fill="#2563EB" font-size="8.5" font-weight="500">&#8594; Graph + Report</text>
  </g>

  <g transform="translate(246,518)">
    <rect x="0" y="0" width="188" height="78" rx="12" fill="#FAFAF9" stroke="#E7E5E4" stroke-width="0.5"/>
    <rect x="0" y="0" width="5" height="78" rx="2.5" fill="#EF4444"/>
    <text x="18" y="22" fill="#0F172A" font-size="11.5" font-weight="600">Biomarker Discovery</text>
    <text x="18" y="40" fill="#475569" font-size="9">Diff. expression</text>
    <text x="18" y="54" fill="#475569" font-size="9">Rank &amp; validate</text>
    <text x="18" y="69" fill="#DC2626" font-size="8.5" font-weight="500">&#8594; Volcano + DEGs</text>
  </g>

  <g transform="translate(448,518)">
    <rect x="0" y="0" width="188" height="78" rx="12" fill="#FAFAF9" stroke="#E7E5E4" stroke-width="0.5"/>
    <rect x="0" y="0" width="5" height="78" rx="2.5" fill="#8B5CF6"/>
    <text x="18" y="22" fill="#0F172A" font-size="11.5" font-weight="600">Causal Inference</text>
    <text x="18" y="40" fill="#475569" font-size="9">Mendelian rand.</text>
    <text x="18" y="54" fill="#475569" font-size="9">Estimate effects</text>
    <text x="18" y="69" fill="#7C3AED" font-size="8.5" font-weight="500">&#8594; MR scatter</text>
  </g>

  <line x1="340" y1="602" x2="340" y2="624" stroke="#94A3B8" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- ════════ OUTPUTS ════════ -->
  <text x="44" y="642" fill="#0F172A" font-size="10.5" font-weight="600" letter-spacing="1.2">OUTPUTS</text>

  <g transform="translate(40,652)">
    <rect x="0" y="0" width="600" height="56" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
    <g transform="translate(12,11)"><rect x="0" y="0" width="92" height="34" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.4"/><text x="46" y="14" text-anchor="middle" fill="#3C3489" font-size="9" font-weight="500">Report</text><text x="46" y="26" text-anchor="middle" fill="#534AB7" font-size="8">PDF · HTML</text></g>
    <g transform="translate(108,11)"><rect x="0" y="0" width="92" height="34" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.4"/><text x="46" y="14" text-anchor="middle" fill="#04342C" font-size="9" font-weight="500">Figures</text><text x="46" y="26" text-anchor="middle" fill="#0F6E56" font-size="8">PNG · SVG</text></g>
    <g transform="translate(204,11)"><rect x="0" y="0" width="92" height="34" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="0.4"/><text x="46" y="14" text-anchor="middle" fill="#4A1B0C" font-size="9" font-weight="500">Tables</text><text x="46" y="26" text-anchor="middle" fill="#993C1D" font-size="8">CSV · TSV</text></g>
    <g transform="translate(300,11)"><rect x="0" y="0" width="92" height="34" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.4"/><text x="46" y="14" text-anchor="middle" fill="#042C53" font-size="9" font-weight="500">KG</text><text x="46" y="26" text-anchor="middle" fill="#185FA5" font-size="8">Network</text></g>
    <g transform="translate(396,11)"><rect x="0" y="0" width="92" height="34" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.4"/><text x="46" y="14" text-anchor="middle" fill="#412402" font-size="9" font-weight="500">Evidence Log</text><text x="46" y="26" text-anchor="middle" fill="#854F0B" font-size="8">Provenance</text></g>
    <g transform="translate(492,11)"><rect x="0" y="0" width="92" height="34" rx="8" fill="#FCEBEB" stroke="#F09595" stroke-width="0.4"/><text x="46" y="14" text-anchor="middle" fill="#501313" font-size="9" font-weight="500">Reproducible</text><text x="46" y="26" text-anchor="middle" fill="#A32D2D" font-size="8">Config · Seed</text></g>
  </g>

  <!-- ════════ FOOTER ════════ -->
  <rect x="0" y="722" width="680" height="98" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="30" y="742" fill="#0F172A" font-size="10" font-weight="600" letter-spacing="0.6">KEY PROPERTIES</text>

  <circle cx="38" cy="760" r="3.5" fill="#10B981"/><text x="48" y="763" fill="#334155" font-size="9">Deterministic — identical output</text>
  <circle cx="38" cy="778" r="3.5" fill="#3B82F6"/><text x="48" y="781" fill="#334155" font-size="9">Evidence-centric — A–E grading</text>
  <circle cx="38" cy="796" r="3.5" fill="#8B5CF6"/><text x="48" y="799" fill="#334155" font-size="9">Reproducible — logs &amp; seeds</text>

  <circle cx="370" cy="760" r="3.5" fill="#F59E0B"/><text x="380" y="763" fill="#334155" font-size="9">Open source — MIT license</text>
  <circle cx="370" cy="778" r="3.5" fill="#EF4444"/><text x="380" y="781" fill="#334155" font-size="9">Python 3.9+ — CLI + SDK</text>
  <circle cx="370" cy="796" r="3.5" fill="#06B6D4"/><text x="380" y="799" fill="#334155" font-size="9">Extensible — plugin architecture</text>

  <g transform="translate(560,734)"><rect x="0" y="0" width="90" height="22" rx="11" fill="#0F172A"/><text x="45" y="15" text-anchor="middle" fill="#F8FAFC" font-size="10" font-weight="600">v1.0.0</text></g>
</svg>
