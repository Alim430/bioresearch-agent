<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 660" role="img" style="background:#ffffff;font-family:-apple-system,'SF Pro Display','Segoe UI',Roboto,sans-serif">
  <title>BioResearch Agent Framework — System Overview</title>
  <desc>End-to-end AI system for biomedical research: 3 cognitive agents, 6 engines, 3 workflows, deterministic outputs.</desc>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#94A3B8" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="ard" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#DB2777" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <linearGradient id="hd" x1="0" y1="0" x2="720" y2="0"><stop offset="0" stop-color="#0F172A"/><stop offset="1" stop-color="#1E293B"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="720" y2="0"><stop offset="0" stop-color="#3B82F6"/><stop offset="1" stop-color="#06B6D4"/></linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="2.6" flood-color="#0F172A" flood-opacity="0.09"/></filter>
  </defs>

  <!-- HEADER -->
  <rect x="0" y="0" width="720" height="56" fill="url(#hd)"/>
  <rect x="0" y="56" width="720" height="3" fill="url(#accent)"/>
  <text x="360" y="26" text-anchor="middle" fill="#F8FAFC" font-size="17" font-weight="600" letter-spacing="0.4">BioResearch Agent Framework</text>
  <text x="360" y="44" text-anchor="middle" fill="#94A3B8" font-size="11.5">An open framework for AI-driven biomedical research</text>

  <!-- INPUT -->
  <g transform="translate(270,70)">
    <rect x="0" y="0" width="180" height="42" rx="21" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1" filter="url(#soft)"/>
    <text x="90" y="18" text-anchor="middle" fill="#1D4ED8" font-size="11.5" font-weight="500">Research Question</text>
    <text x="90" y="33" text-anchor="middle" fill="#64748B" font-size="9.5">Natural language input</text>
  </g>
  <line x1="360" y1="112" x2="360" y2="124" stroke="#94A3B8" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- COGNITIVE AGENTS -->
  <rect x="44" y="130" width="3" height="12" rx="1.5" fill="#F59E0B"/>
  <text x="54" y="141" fill="#0F172A" font-size="10.5" font-weight="600" letter-spacing="1.2">COGNITIVE AGENTS</text>

  <g transform="translate(44,146)">
    <rect x="0" y="0" width="196" height="78" rx="12" fill="#FFFBEB" stroke="#F59E0B" stroke-width="0.75" filter="url(#soft)"/>
    <circle cx="24" cy="24" r="14" fill="#FBBF24"/>
    <text x="24" y="28" text-anchor="middle" fill="#78350F" font-size="12.5" font-weight="600">H</text>
    <text x="48" y="20" fill="#92400E" font-size="12" font-weight="600">Hypothesis Agent</text>
    <text x="48" y="36" fill="#B45309" font-size="9.5">Formulate testable</text>
    <text x="48" y="50" fill="#B45309" font-size="9.5">hypotheses &amp; claims</text>
    <line x1="16" y1="58" x2="180" y2="58" stroke="#FDE68A" stroke-width="0.5"/>
    <text x="98" y="71" text-anchor="middle" fill="#A16207" font-size="8.5">Decompose · Predict</text>
  </g>

  <g transform="translate(262,146)">
    <rect x="0" y="0" width="196" height="78" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="0.75" filter="url(#soft)"/>
    <circle cx="24" cy="24" r="14" fill="#60A5FA"/>
    <text x="24" y="28" text-anchor="middle" fill="#1E3A8A" font-size="12.5" font-weight="600">E</text>
    <text x="48" y="20" fill="#1E40AF" font-size="12" font-weight="600">Evidence Agent</text>
    <text x="48" y="36" fill="#2563EB" font-size="9.5">Retrieve &amp; integrate</text>
    <text x="48" y="50" fill="#2563EB" font-size="9.5">multi-source data</text>
    <line x1="16" y1="58" x2="180" y2="58" stroke="#BFDBFE" stroke-width="0.5"/>
    <text x="98" y="71" text-anchor="middle" fill="#1D4ED8" font-size="8.5">Search · Extract</text>
  </g>

  <g transform="translate(480,146)">
    <rect x="0" y="0" width="196" height="78" rx="12" fill="#FDF2F8" stroke="#EC4899" stroke-width="0.75" filter="url(#soft)"/>
    <circle cx="24" cy="24" r="14" fill="#F472B6"/>
    <text x="24" y="28" text-anchor="middle" fill="#831843" font-size="12.5" font-weight="600">C</text>
    <text x="48" y="20" fill="#9D174D" font-size="12" font-weight="600">Critique Agent</text>
    <text x="48" y="36" fill="#BE185D" font-size="9.5">Evaluate &amp; refine</text>
    <text x="48" y="50" fill="#BE185D" font-size="9.5">challenge hypotheses</text>
    <line x1="16" y1="58" x2="180" y2="58" stroke="#FBCFE8" stroke-width="0.5"/>
    <text x="98" y="71" text-anchor="middle" fill="#9D174D" font-size="8.5">Detect · Score</text>
  </g>

  <!-- agent interaction: forward pass + refinement loop -->
  <path d="M246,170 L256,170" fill="none" stroke="#CBD5E1" stroke-width="1.1" stroke-linecap="round" marker-end="url(#ar)"/>
  <path d="M464,170 L474,170" fill="none" stroke="#CBD5E1" stroke-width="1.1" stroke-linecap="round" marker-end="url(#ar)"/>
  <path d="M540,224 C540,246 80,246 80,224" fill="none" stroke="#DB2777" stroke-width="1.2" stroke-dasharray="6,3" stroke-linecap="round" marker-end="url(#ard)" opacity="0.8"/>
  <text x="360" y="240" text-anchor="middle" fill="#BE185D" font-size="9.5" font-weight="600" font-style="italic" paint-order="stroke" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round">iterative refinement loop</text>

  <line x1="360" y1="252" x2="360" y2="272" stroke="#94A3B8" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- CORE ENGINES -->
  <rect x="44" y="278" width="3" height="12" rx="1.5" fill="#64748B"/>
  <text x="54" y="289" fill="#0F172A" font-size="10.5" font-weight="600" letter-spacing="1.2">CORE ENGINES</text>

  <g transform="translate(44,292)"><rect x="0" y="0" width="92" height="52" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5" filter="url(#soft)"/><text x="46" y="22" text-anchor="middle" fill="#334155" font-size="10.5" font-weight="500">Reasoning</text><text x="46" y="37" text-anchor="middle" fill="#64748B" font-size="8.5">Plan · Logic</text><text x="46" y="47" text-anchor="middle" fill="#94A3B8" font-size="7.5">Multi-step</text></g>
  <g transform="translate(144,292)"><rect x="0" y="0" width="92" height="52" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5" filter="url(#soft)"/><text x="46" y="22" text-anchor="middle" fill="#334155" font-size="10.5" font-weight="500">Retrieval</text><text x="46" y="37" text-anchor="middle" fill="#64748B" font-size="8.5">Search · Graph</text><text x="46" y="47" text-anchor="middle" fill="#94A3B8" font-size="7.5">Knowledge</text></g>
  <g transform="translate(244,292)"><rect x="0" y="0" width="92" height="52" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5" filter="url(#soft)"/><text x="46" y="22" text-anchor="middle" fill="#334155" font-size="10.5" font-weight="500">Analysis</text><text x="46" y="37" text-anchor="middle" fill="#64748B" font-size="8.5">Stats · Bio</text><text x="46" y="47" text-anchor="middle" fill="#94A3B8" font-size="7.5">Bioinformatics</text></g>
  <g transform="translate(344,292)"><rect x="0" y="0" width="92" height="52" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5" filter="url(#soft)"/><text x="46" y="22" text-anchor="middle" fill="#334155" font-size="10.5" font-weight="500">Evidence</text><text x="46" y="37" text-anchor="middle" fill="#64748B" font-size="8.5">Score · Grade</text><text x="46" y="47" text-anchor="middle" fill="#94A3B8" font-size="7.5">Confidence</text></g>
  <g transform="translate(444,292)"><rect x="0" y="0" width="92" height="52" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5" filter="url(#soft)"/><text x="46" y="22" text-anchor="middle" fill="#334155" font-size="10.5" font-weight="500">Writing</text><text x="46" y="37" text-anchor="middle" fill="#64748B" font-size="8.5">Draft · Cite</text><text x="46" y="47" text-anchor="middle" fill="#94A3B8" font-size="7.5">Generation</text></g>
  <g transform="translate(544,292)"><rect x="0" y="0" width="92" height="52" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5" filter="url(#soft)"/><text x="46" y="22" text-anchor="middle" fill="#334155" font-size="10.5" font-weight="500">Tool</text><text x="46" y="37" text-anchor="middle" fill="#64748B" font-size="8.5">Run · I/O</text><text x="46" y="47" text-anchor="middle" fill="#94A3B8" font-size="7.5">Orchestrate</text></g>

  <!-- validation badge -->
  <g transform="translate(150,354)">
    <rect x="0" y="0" width="420" height="26" rx="13" fill="#ECFDF5" stroke="#10B981" stroke-width="0.75" filter="url(#soft)"/>
    <circle cx="22" cy="13" r="7.5" fill="#10B981"/>
    <path d="M19 13 L21.3 15.4 L25.4 11" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="234" y="16.5" text-anchor="middle" fill="#047857" font-size="8.5" font-weight="500">Validation &amp; Scoring — statistical checks · consistency · confidence</text>
  </g>

  <line x1="360" y1="380" x2="360" y2="392" stroke="#94A3B8" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- RESEARCH WORKFLOWS -->
  <rect x="44" y="398" width="3" height="12" rx="1.5" fill="#3B82F6"/>
  <text x="54" y="409" fill="#0F172A" font-size="10.5" font-weight="600" letter-spacing="1.2">RESEARCH WORKFLOWS</text>

  <g transform="translate(44,414)">
    <rect x="0" y="0" width="196" height="72" rx="12" fill="#FAFAF9" stroke="#E7E5E4" stroke-width="0.5" filter="url(#soft)"/>
    <rect x="0" y="0" width="5" height="72" rx="2.5" fill="#3B82F6"/>
    <text x="18" y="20" fill="#0F172A" font-size="11.5" font-weight="600">Literature Review</text>
    <text x="18" y="37" fill="#475569" font-size="9">Search &amp; screen</text>
    <text x="18" y="51" fill="#475569" font-size="9">Build knowledge graph</text>
    <text x="18" y="65" fill="#2563EB" font-size="8.5" font-weight="500">&#8594; Graph + Report</text>
  </g>

  <g transform="translate(262,414)">
    <rect x="0" y="0" width="196" height="72" rx="12" fill="#FAFAF9" stroke="#E7E5E4" stroke-width="0.5" filter="url(#soft)"/>
    <rect x="0" y="0" width="5" height="72" rx="2.5" fill="#EF4444"/>
    <text x="18" y="20" fill="#0F172A" font-size="11.5" font-weight="600">Biomarker Discovery</text>
    <text x="18" y="37" fill="#475569" font-size="9">Differential expression</text>
    <text x="18" y="51" fill="#475569" font-size="9">Rank &amp; validate</text>
    <text x="18" y="65" fill="#DC2626" font-size="8.5" font-weight="500">&#8594; Volcano + DEGs</text>
  </g>

  <g transform="translate(480,414)">
    <rect x="0" y="0" width="196" height="72" rx="12" fill="#FAFAF9" stroke="#E7E5E4" stroke-width="0.5" filter="url(#soft)"/>
    <rect x="0" y="0" width="5" height="72" rx="2.5" fill="#8B5CF6"/>
    <text x="18" y="20" fill="#0F172A" font-size="11.5" font-weight="600">Causal Inference</text>
    <text x="18" y="37" fill="#475569" font-size="9">Mendelian randomization</text>
    <text x="18" y="51" fill="#475569" font-size="9">Estimate effects</text>
    <text x="18" y="65" fill="#7C3AED" font-size="8.5" font-weight="500">&#8594; MR scatter</text>
  </g>

  <line x1="360" y1="486" x2="360" y2="498" stroke="#94A3B8" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- OUTPUTS -->
  <rect x="44" y="504" width="3" height="12" rx="1.5" fill="#10B981"/>
  <text x="54" y="515" fill="#0F172A" font-size="10.5" font-weight="600" letter-spacing="1.2">OUTPUTS</text>

  <g transform="translate(42,510)">
    <rect x="0" y="0" width="636" height="50" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5" filter="url(#soft)"/>
    <g transform="translate(12,8)"><rect x="0" y="0" width="92" height="34" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.4"/><text x="46" y="14" text-anchor="middle" fill="#3C3489" font-size="9" font-weight="500">Report</text><text x="46" y="26" text-anchor="middle" fill="#534AB7" font-size="8">PDF · HTML</text></g>
    <g transform="translate(108,8)"><rect x="0" y="0" width="92" height="34" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.4"/><text x="46" y="14" text-anchor="middle" fill="#04342C" font-size="9" font-weight="500">Figures</text><text x="46" y="26" text-anchor="middle" fill="#0F6E56" font-size="8">PNG · SVG</text></g>
    <g transform="translate(204,8)"><rect x="0" y="0" width="92" height="34" rx="8" fill="#FAECE7" stroke="#F0997B" stroke-width="0.4"/><text x="46" y="14" text-anchor="middle" fill="#4A1B0C" font-size="9" font-weight="500">Tables</text><text x="46" y="26" text-anchor="middle" fill="#993C1D" font-size="8">CSV · TSV</text></g>
    <g transform="translate(300,8)"><rect x="0" y="0" width="92" height="34" rx="8" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.4"/><text x="46" y="14" text-anchor="middle" fill="#042C53" font-size="8" font-weight="600">Knowledge Graph</text><text x="46" y="26" text-anchor="middle" fill="#185FA5" font-size="7.5">PNG</text></g>
    <g transform="translate(396,8)"><rect x="0" y="0" width="92" height="34" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.4"/><text x="46" y="14" text-anchor="middle" fill="#412402" font-size="9" font-weight="500">Evidence Log</text><text x="46" y="26" text-anchor="middle" fill="#854F0B" font-size="8">Provenance</text></g>
    <g transform="translate(492,8)"><rect x="0" y="0" width="92" height="34" rx="8" fill="#FCEBEB" stroke="#F09595" stroke-width="0.4"/><text x="46" y="14" text-anchor="middle" fill="#501313" font-size="9" font-weight="500">Reproducible</text><text x="46" y="26" text-anchor="middle" fill="#A32D2D" font-size="8">Config · Seed</text></g>
  </g>

  <!-- FOOTER -->
  <rect x="0" y="572" width="720" height="88" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
  <rect x="0" y="572" width="720" height="2.5" fill="url(#accent)"/>
  <text x="44" y="594" fill="#0F172A" font-size="10" font-weight="600" letter-spacing="0.6">KEY PROPERTIES</text>

  <circle cx="52" cy="612" r="3.5" fill="#10B981"/><text x="62" y="615" fill="#334155" font-size="9">Deterministic — identical output</text>
  <circle cx="52" cy="632" r="3.5" fill="#3B82F6"/><text x="62" y="635" fill="#334155" font-size="9">Evidence-centric — A–E grading</text>
  <circle cx="52" cy="652" r="3.5" fill="#8B5CF6"/><text x="62" y="655" fill="#334155" font-size="9">Reproducible — logs &amp; seeds</text>

  <circle cx="408" cy="612" r="3.5" fill="#F59E0B"/><text x="418" y="615" fill="#334155" font-size="9">Open source — MIT license</text>
  <circle cx="408" cy="632" r="3.5" fill="#EF4444"/><text x="418" y="635" fill="#334155" font-size="9">Python 3.9+ — CLI + SDK</text>
  <circle cx="408" cy="652" r="3.5" fill="#06B6D4"/><text x="418" y="655" fill="#334155" font-size="9">Extensible — plugin architecture</text>

  <g transform="translate(610,584)"><rect x="0" y="0" width="90" height="22" rx="11" fill="#0F172A"/><text x="45" y="15" text-anchor="middle" fill="#F8FAFC" font-size="10" font-weight="600">v1.0.0</text></g>
</svg>
