<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 820" role="img" style="background:#fff;font-family:-apple-system,'SF Pro Display',Segoe UI,Roboto,sans-serif">
  <title>BioResearch Agent Framework — System Overview</title>
  <desc>End-to-end AI system for biomedical research: 3 cognitive agents, 6 engines, 3 workflows, deterministic outputs.</desc>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 1L8 5L2 9" fill="none" stroke="#0F172A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <linearGradient id="headGrad" x1="0" y1="0" x2="680" y2="0">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════ HEADER ═══════════════ -->
  <rect x="0" y="0" width="680" height="72" fill="url(#headGrad)"/>
  <text x="340" y="30" text-anchor="middle" fill="#F8FAFC" font-size="18" font-weight="600" letter-spacing="0.5">BioResearch Agent Framework</text>
  <text x="340" y="52" text-anchor="middle" fill="#94A3B8" font-size="12">An open framework for AI-driven biomedical research</text>

  <!-- ═══════════════ LAYER 1: USER INPUT ═══════════════ -->
  <g transform="translate(260,92)">
    <rect x="0" y="0" width="160" height="46" rx="23" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
    <text x="80" y="20" text-anchor="middle" fill="#1E40AF" font-size="11" font-weight="500">Research Question</text>
    <text x="80" y="34" text-anchor="middle" fill="#64748B" font-size="10">Natural Language Input</text>
  </g>
  <!-- arrow down -->
  <line x1="340" y1="140" x2="340" y2="162" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══════════════ LAYER 2: 3 COGNITIVE AGENTS ═══════════════ -->
  <text x="40" y="180" fill="#0F172A" font-size="11" font-weight="600" letter-spacing="1">COGNITIVE AGENTS</text>

  <!-- Agent 1: Hypothesis Formation -->
  <g transform="translate(40,192)">
    <rect x="0" y="0" width="186" height="78" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.75"/>
    <circle cx="22" cy="22" r="14" fill="#FBBF24"/>
    <text x="22" y="26" text-anchor="middle" fill="#78350F" font-size="13" font-weight="600">H</text>
    <text x="44" y="19" fill="#92400E" font-size="12" font-weight="600">Hypothesis Agent</text>
    <text x="44" y="34" fill="#A16207" font-size="10">Formulate testable</text>
    <text x="44" y="47" fill="#A16207" font-size="10">hypotheses &amp; claims</text>
    <line x1="16" y1="58" x2="170" y2="58" stroke="#FDE68A" stroke-width="0.5"/>
    <text x="93" y="70" text-anchor="middle" fill="#92400E" font-size="9">Decomposition · Mechanism Prediction</text>
  </g>

  <!-- Agent 2: Evidence Synthesis -->
  <g transform="translate(247,192)">
    <rect x="0" y="0" width="186" height="78" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="0.75"/>
    <circle cx="22" cy="22" r="14" fill="#60A5FA"/>
    <text x="22" y="26" text-anchor="middle" fill="#1E3A8A" font-size="13" font-weight="600">E</text>
    <text x="44" y="19" fill="#1E40AF" font-size="12" font-weight="600">Evidence Agent</text>
    <text x="44" y="34" fill="#3B82F6" font-size="10">Retrieve, integrate &amp;</text>
    <text x="44" y="47" fill="#3B82F6" font-size="10">summarize multi-source data</text>
    <line x1="16" y1="58" x2="170" y2="58" stroke="#BFDBFE" stroke-width="0.5"/>
    <text x="93" y="70" text-anchor="middle" fill="#1E40AF" font-size="9">Literature Search · Data Extraction</text>
  </g>

  <!-- Agent 3: Scientific Critique -->
  <g transform="translate(454,192)">
    <rect x="0" y="0" width="186" height="78" rx="10" fill="#FCE7F3" stroke="#EC4899" stroke-width="0.75"/>
    <circle cx="22" cy="22" r="14" fill="#F472B6"/>
    <text x="22" y="26" text-anchor="middle" fill="#831843" font-size="13" font-weight="600">C</text>
    <text x="44" y="19" fill="#9D174D" font-size="12" font-weight="600">Critique Agent</text>
    <text x="44" y="34" fill="#BE185D" font-size="10">Evaluate, challenge &amp;</text>
    <text x="44" y="47" fill="#BE185D" font-size="10">refine hypotheses</text>
    <line x1="16" y1="58" x2="170" y2="58" stroke="#FBCFE8" stroke-width="0.5"/>
    <text x="93" y="70" text-anchor="middle" fill="#9D174D" font-size="9">Bias Detection · Confidence Scoring</text>
  </g>

  <!-- Inter-agent feedback arrows -->
  <path d="M227,230 Q240,215 254,230" fill="none" stroke="#94A3B8" stroke-width="0.85" stroke-dasharray="3,2" marker-end="url(#a)"/>
  <path d="M434,230 Q447,215 461,230" fill="none" stroke="#94A3B8" stroke-width="0.85" stroke-dasharray="3,2" marker-end="url(#a)"/>
  <!-- return loop from Critique back to Hypothesis -->
  <path d="M547,270 Q547,295 133,295 Q133,295 133,278" fill="none" stroke="#EC4899" stroke-width="0.75" stroke-dasharray="4,3" marker-end="url(#a)" opacity="0.6"/>
  <text x="340" y="299" text-anchor="middle" fill="#94A3B8" font-size="8.5" font-style="italic">iterative refinement loop</text>

  <!-- arrow down to engines -->
  <line x1="340" y1="310" x2="340" y2="332" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══════════════ LAYER 3: 6 CORE ENGINES ═══════════════ -->
  <text x="40" y="350" fill="#0F172A" font-size="11" font-weight="600" letter-spacing="1">CORE ENGINES</text>

  <!-- Engine row 1 -->
  <g transform="translate(40,362)">
    <rect x="0" y="0" width="96" height="56" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.5"/>
    <text x="48" y="24" text-anchor="middle" fill="#334155" font-size="10.5" font-weight="500">Reasoning</text>
    <text x="48" y="38" text-anchor="middle" fill="#64748B" font-size="9">Multi-step logic</text>
    <text x="48" y="49" text-anchor="middle" fill="#94A3B8" font-size="8">&amp; planning</text>
  </g>
  <g transform="translate(148,362)">
    <rect x="0" y="0" width="96" height="56" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.5"/>
    <text x="48" y="24" text-anchor="middle" fill="#334155" font-size="10.5" font-weight="500">Retrieval</text>
    <text x="48" y="38" text-anchor="middle" fill="#64748B" font-size="9">Literature search</text>
    <text x="48" y="49" text-anchor="middle" fill="#94A3B8" font-size="8">&amp; knowledge graph</text>
  </g>
  <g transform="translate(256,362)">
    <rect x="0" y="0" width="96" height="56" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.5"/>
    <text x="48" y="24" text-anchor="middle" fill="#334155" font-size="10.5" font-weight="500">Analysis</text>
    <text x="48" y="38" text-anchor="middle" fill="#64748B" font-size="9">Statistical &amp;</text>
    <text x="48" y="49" text-anchor="middle" fill="#94A3B8" font-size="8">bioinformatics</text>
  </g>
  <g transform="translate(364,362)">
    <rect x="0" y="0" width="96" height="56" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.5"/>
    <text x="48" y="24" text-anchor="middle" fill="#334155" font-size="10.5" font-weight="500">Evidence</text>
    <text x="48" y="38" text-anchor="middle" fill="#64748B" font-size="9">Integration &amp;</text>
    <text x="48" y="49" text-anchor="middle" fill="#94A3B8" font-size="8">confidence scoring</text>
  </g>
  <g transform="translate(472,362)">
    <rect x="0" y="0" width="96" height="56" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.5"/>
    <text x="48" y="24" text-anchor="middle" fill="#334155" font-size="10.5" font-weight="500">Writing</text>
    <text x="48" y="38" text-anchor="middle" fill="#64748B" font-size="9">Manuscript &amp;</text>
    <text x="48" y="49" text-anchor="middle" fill="#94A3B8" font-size="8">report generation</text>
  </g>
  <g transform="translate(580,362)">
    <rect x="0" y="0" width="60" height="56" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="0.5"/>
    <text x="30" y="24" text-anchor="middle" fill="#334155" font-size="10.5" font-weight="500">Tool</text>
    <text x="30" y="38" text-anchor="middle" fill="#64748B" font-size="9">Orchestration</text>
    <text x="30" y="49" text-anchor="middle" fill="#94A3B8" font-size="8">&amp; I/O</text>
  </g>

  <!-- Validation badge below engines -->
  <g transform="translate(220,430)">
    <rect x="0" y="0" width="240" height="28" rx="14" fill="#ECFDF5" stroke="#10B981" stroke-width="0.5"/>
    <text x="120" y="18" text-anchor="middle" fill="#047857" font-size="9.5" font-weight="500">&#10003; Validation &amp; Scoring Engine — Statistical Check · Consistency · Confidence</text>
  </g>

  <!-- arrow down -->
  <line x1="340" y1="468" x2="340" y2="490" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══════════════ LAYER 4: 3 WORKFLOWS ═══════════════ -->
  <text x="40" y="508" fill="#0F172A" font-size="11" font-weight="600" letter-spacing="1">RESEARCH WORKFLOWS</text>

  <g transform="translate(40,520)">
    <rect x="0" y="0" width="186" height="72" rx="10" fill="#FAFAF9" stroke="#D6D3D1" stroke-width="0.5"/>
    <rect x="0" y="0" width="6" height="72" rx="3" fill="#3B82F6"/>
    <text x="20" y="20" fill="#0F172A" font-size="11.5" font-weight="600">Literature Review</text>
    <text x="20" y="36" fill="#57534E" font-size="9.5">Systematic search &amp; screening</text>
    <text x="20" y="49" fill="#57534E" font-size="9.5">Knowledge graph construction</text>
    <text x="20" y="62" fill="#78716C" font-size="8.5">&#8594; Knowledge Graph + Summary Report</text>
  </g>

  <g transform="translate(247,520)">
    <rect x="0" y="0" width="186" height="72" rx="10" fill="#FAFAF9" stroke="#D6D3D1" stroke-width="0.5"/>
    <rect x="0" y="0" width="6" height="72" rx="3" fill="#EF4444"/>
    <text x="20" y="20" fill="#0F172A" font-size="11.5" font-weight="600">Biomarker Discovery</text>
    <text x="20" y="36" fill="#57534E" font-size="9.5">Differential expression analysis</text>
    <text x="20" y="49" fill="#57534E" font-size="9.5">Candidate ranking &amp; validation</text>
    <text x="20" y="62" fill="#78716C" font-size="8.5">&#8594; Volcano Plot + DEG Table</text>
  </g>

  <g transform="translate(454,520)">
    <rect x="0" y="0" width="186" height="72" rx="10" fill="#FAFAF9" stroke="#D6D3D1" stroke-width="0.5"/>
    <rect x="0" y="0" width="6" height="72" rx="3" fill="#8B5CF6"/>
    <text x="20" y="20" fill="#0F172A" font-size="11.5" font-weight="600">Causal Inference</text>
    <text x="20" y="36" fill="#57534E" font-size="9.5">Mendelian Randomization</text>
    <text x="20" y="49" fill="#57534E" font-size="9.5">Causal effect estimation</text>
    <text x="20" y="62" fill="#78716C" font-size="8.5">&#8594; MR Scatter + Effect Estimates</text>
  </g>

  <!-- arrow down to outputs -->
  <line x1="340" y1="602" x2="340" y2="624" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ═══════════════ LAYER 5: OUTPUTS ═══════════════ -->
  <text x="40" y="642" fill="#0F172A" font-size="11" font-weight="600" letter-spacing="1">OUTPUTS</text>

  <g transform="translate(40,654)">
    <rect x="0" y="0" width="600" height="52" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
    
    <g transform="translate(20,10)">
      <rect x="0" y="0" width="80" height="32" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.4"/>
      <text x="40" y="14" text-anchor="middle" fill="#3C3489" font-size="9" font-weight="500">Report</text>
      <text x="40" y="25" text-anchor="middle" fill="#534AB7" font-size="8">PDF / HTML</text>
    </g>
    <g transform="translate(112,10)">
      <rect x="0" y="0" width="80" height="32" rx="6" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.4"/>
      <text x="40" y="14" text-anchor="middle" fill="#04342C" font-size="9" font-weight="500">Figures</text>
      <text x="40" y="25" text-anchor="middle" fill="#0F6E56" font-size="8">PNG / SVG</text>
    </g>
    <g transform="translate(204,10)">
      <rect x="0" y="0" width="80" height="32" rx="6" fill="#FAECE7" stroke="#F0997B" stroke-width="0.4"/>
      <text x="40" y="14" text-anchor="middle" fill="#4A1B0C" font-size="9" font-weight="500">Tables</text>
      <text x="40" y="25" text-anchor="middle" fill="#993C1D" font-size="8">CSV / TSV</text>
    </g>
    <g transform="translate(296,10)">
      <rect x="0" y="0" width="80" height="32" rx="6" fill="#E6F1FB" stroke="#85B7EB" stroke-width="0.4"/>
      <text x="40" y="14" text-anchor="middle" fill="#042C53" font-size="9" font-weight="500">Knowledge Graph</text>
      <text x="40" y="25" text-anchor="middle" fill="#185FA5" font-size="8">Network PNG</text>
    </g>
    <g transform="translate(388,10)">
      <rect x="0" y="0" width="80" height="32" rx="6" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.4"/>
      <text x="40" y="14" text-anchor="middle" fill="#412402" font-size="9" font-weight="500">Evidence Log</text>
      <text x="40" y="25" text-anchor="middle" fill="#854F0B" font-size="8">Full Provenance</text>
    </g>
    <g transform="translate(480,10)">
      <rect x="0" y="0" width="100" height="32" rx="6" fill="#FCEBEB" stroke="#F09595" stroke-width="0.4"/>
      <text x="50" y="14" text-anchor="middle" fill="#501313" font-size="9" font-weight="500">Reproducibility</text>
      <text x="50" y="25" text-anchor="middle" fill="#A32D2D" font-size="8">Package + Config</text>
    </g>
  </g>

  <!-- ═══════════════ FOOTER BAR ═══════════════ -->
  <rect x="0" y="720" width="680" height="100" fill="#FAFAF9" stroke="#E7E5E4" stroke-width="0.5"/>
  
  <!-- Footer: Key Properties -->
  <g transform="translate(30,732)">
    <text x="0" y="12" fill="#0F172A" font-size="10" font-weight="600" letter-spacing="0.5">KEY PROPERTIES</text>
    
    <circle cx="8" cy="28" r="4" fill="#10B981"/><text x="18" y="31" fill="#334155" font-size="9.5">Deterministic — Same input always produces identical output</text>
    
    <circle cx="8" cy="44" r="4" fill="#3B82F6"/><text x="18" y="47" fill="#334155" font-size="9.5">Evidence-Centric — Every claim traced to source (A–E grading)</text>
    
    <circle cx="8" cy="60" r="4" fill="#8B5CF6"/><text x="18" y="63" fill="#334155" font-size="9.5">Reproducible — Full logs, seed control, checkpoint/resume</text>
    
    <circle cx="350" cy="28" r="4" fill="#F59E0B"/><text x="360" y="31" fill="#334155" font-size="9.5">Open Source — MIT License</text>
    
    <circle cx="350" cy="44" r="4" fill="#EF4444"/><text x="360" y="47" fill="#334155" font-size="9.5">Python 3.9+ — CLI + SDK dual interface</text>
    
    <circle cx="350" cy="60" r="4" fill="#06B6D4"/><text x="360" y="63" fill="#334155" font-size="9.5">Plugin Architecture — Extensible tools &amp; agents</text>
  </g>

  <!-- Version tag -->
  <g transform="translate(560,732)">
    <rect x="0" y="0" width="90" height="22" rx="11" fill="#0F172A"/>
    <text x="45" y="15" text-anchor="middle" fill="#F8FAFC" font-size="10" font-weight="600">v1.0.0</text>
  </g>
</svg>
