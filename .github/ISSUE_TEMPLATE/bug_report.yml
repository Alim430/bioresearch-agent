name: Bug report
description: Report a reproducible defect in the framework or a skill
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please fill this in so we can reproduce quickly.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal commands / inputs that trigger the bug.
      placeholder: |
        1. bioresearch run ... --use-mock
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `bioresearch --version` (or git tag / commit).
    validations:
      required: true
  - type: dropdown
    id: data-tier
    attributes:
      label: Data used
      description: Which data tier does this involve? (see DATA_GOVERNANCE.md)
      options:
        - "Public / mock / synthetic only"
        - "Real public summary data (e.g. IEU OpenGWAS, GEO)"
        - "Controlled-access (ADNI / UKB-PPP / MetaBrain / deCODE)"
    validations:
      required: true
  - type: checkboxes
    id: honesty
    attributes:
      label: Honesty checklist
      options:
        - label: "I confirm no controlled-access data is committed to this repo"
          required: true
